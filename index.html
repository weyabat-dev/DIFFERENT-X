<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Nova</title>
<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:white;text-align:center}
#menu{padding-top:40px}
#game{display:none}#ui{position:fixed;top:0;left:0;right:0;background:#111;padding:10px;display:flex;gap:15px;align-items:center;justify-content:center}

#map{display:grid;grid-template-columns:repeat(25,28px);gap:2px;margin-top:80px;justify-content:center}

.tile{width:28px;height:28px;background:#1f2a44;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px} .player{background:#4caf50} .monster{background:#e53935} .shop{background:#ffb300} .water{background:#1976d2} .mountain{background:#6d4c41}

#chat{position:fixed;bottom:0;left:0;right:0;background:#111;padding:10px} #messages{height:100px;overflow:auto;background:#000;padding:5px;margin-bottom:5px}

button{padding:8px 14px;border:none;border-radius:8px;background:#5c6cff;color:white;font-size:16px}

#controls{margin-top:10px} .ctrl{width:60px;height:60px;margin:5px;font-size:20px} </style>

</head>
<body><div id="menu">
<h1>Maths Nova</h1>
<h2>Explore the world</h2>
<button onclick="startGame()">Start Game</button>
</div><div id="game"><div id="ui">
<div>Level: <span id="level">1</span></div>
<div>Coins: <span id="coins">0</span></div>
<div>Energy: <span id="energy">100</span></div>
</div><div id="map"></div><div id="controls">
<div>
<button class="ctrl" onclick="move(0,-1)">⬆</button>
</div>
<div>
<button class="ctrl" onclick="move(-1,0)">⬅</button>
<button class="ctrl" onclick="move(1,0)">➡</button>
</div>
<div>
<button class="ctrl" onclick="move(0,1)">⬇</button>
</div>
</div><div id="chat">
<div id="messages"></div>
<input id="msg" placeholder="message" style="width:70%">
<button onclick="sendMsg()">Send</button>
</div></div><script>

const mapSize = 25
let map = []
let player = {x:12,y:12,level:1,coins:0,energy:100}

const mobs=["Number Slime","Algebra Beast","Prime Golem","Matrix Spider","Quantum Dragon"]

function startGame(){
 document.getElementById("menu").style.display="none"
 document.getElementById("game").style.display="block"
 generateMap()
 drawMap()
 updateUI()
}

function generateMap(){
 map=[]
 for(let y=0;y<mapSize;y++){
  for(let x=0;x<mapSize;x++){
   let type="tile"
   let r=Math.random()
   if(r<0.08)type="monster"
   else if(r<0.12)type="shop"
   else if(r<0.18)type="water"
   else if(r<0.22)type="mountain"
   map.push({x,y,type})
  }
 }
}

function drawMap(){
 const m=document.getElementById("map")
 m.innerHTML=""
 map.forEach(t=>{
  const d=document.createElement("div")
  d.className="tile "+t.type
  if(player.x===t.x && player.y===t.y){
   d.className="tile player"
   d.innerText="P"
  }
  m.appendChild(d)
 })
}

function move(dx,dy){
 player.x=Math.max(0,Math.min(mapSize-1,player.x+dx))
 player.y=Math.max(0,Math.min(mapSize-1,player.y+dy))
 player.energy--
 checkTile()
 drawMap()
 updateUI()
}

function checkTile(){
 const tile=map.find(t=>t.x===player.x && t.y===player.y)
 if(tile.type==="monster")battle()
}

function randomMath(){
 let a=Math.floor(Math.random()*20)
 let b=Math.floor(Math.random()*20)
 let ans=a+b
 let input=prompt(`${a} + ${b} = ?`)
 return Number(input)===ans
}

function battle(){
 const mob=mobs[Math.floor(Math.random()*mobs.length)]
 if(randomMath()){
  player.coins+=10
  log("Defeated "+mob)
 }else{
  player.energy-=10
  log(mob+" hit you")
 }
}

function sendMsg(){
 let msg=document.getElementById("msg").value
 log("Player: "+msg)
 document.getElementById("msg").value=""
}

function log(t){
 let m=document.getElementById("messages")
 m.innerHTML+=t+"<br>"
 m.scrollTop=m.scrollHeight
}

function updateUI(){
 document.getElementById("level").innerText=player.level
 document.getElementById("coins").innerText=player.coins
 document.getElementById("energy").innerText=player.energy
}

</script></body>
</html>

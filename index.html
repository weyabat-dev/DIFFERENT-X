<!DOCTYPE html>
<html>

<head>

<title>AI Math Universe</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
margin:0;
}

.container{
margin-top:50px;
}

button{
padding:12px;
margin:10px;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
font-size:16px;
cursor:pointer;
}

input{
padding:10px;
border-radius:10px;
border:none;
margin:10px;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
width:300px;
margin:auto;
margin-top:20px;
}

.question{
font-size:30px;
margin:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>🌌 AI Math Universe</h1>

<button onclick="showPractice()">🎯 Practice</button>
<button onclick="showBattle()">⚔️ Battle</button>

<div id="app"></div>

</div>

<script>

let correct
let score=0

function showPractice(){

document.getElementById("app").innerHTML=

`
<div class="card">

<h2>Practice Mode</h2>

<div id="question" class="question"></div>

<input id="answer" placeholder="Answer">

<br>

<button onclick="submitAnswer()">Submit</button>

<p id="result"></p>

<p id="score">Score: 0</p>

</div>
`

newQuestion()

}

function newQuestion(){

let a=Math.floor(Math.random()*20)
let b=Math.floor(Math.random()*20)

correct=a+b

document.getElementById("question").innerText=
a+" + "+b

}

function submitAnswer(){

let user=document.getElementById("answer").value

if(user==correct){

score++

document.getElementById("result").innerText="✅ Correct"

}else{

document.getElementById("result").innerText=
"❌ Answer: "+correct

}

document.getElementById("score").innerText=
"Score: "+score

document.getElementById("answer").value=""

newQuestion()

}

function showBattle(){

document.getElementById("app").innerHTML=

`
<div class="card">

<h2>⚔️ Math Battle</h2>

<div id="question" class="question"></div>

<input id="p1" placeholder="Player 1">

<input id="p2" placeholder="Player 2">

<br>

<button onclick="submitBattle()">Submit</button>

<p>Player1: <span id="s1">0</span></p>
<p>Player2: <span id="s2">0</span></p>

</div>
`

battleQuestion()

}

let s1=0
let s2=0
let correctBattle

function battleQuestion(){

let a=Math.floor(Math.random()*20)
let b=Math.floor(Math.random()*20)

correctBattle=a+b

document.getElementById("question").innerText=
a+" + "+b

}

function submitBattle(){

let a1=document.getElementById("p1").value
let a2=document.getElementById("p2").value

if(a1==correctBattle) s1++
if(a2==correctBattle) s2++

document.getElementById("s1").innerText=s1
document.getElementById("s2").innerText=s2

battleQuestion()

}

</script>

</body>

</html>

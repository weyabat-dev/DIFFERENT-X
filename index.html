<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Nova V20000</title><style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
text-align:center;
}

header{
font-size:30px;
padding:16px;
font-weight:bold;
background:#020617;
box-shadow:0 0 10px #000;
}

#stats{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:10px;
}

.stat{
background:#111827;
padding:10px 18px;
border-radius:10px;
min-width:80px;
}

#game{
margin-top:20px;
padding:10px;
}

#question{
font-size:28px;
margin:20px 0;
}

input{
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
width:140px;
text-align:center;
}

button{
padding:10px 18px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
font-size:16px;
cursor:pointer;
margin:5px;
}

button:hover{background:#4f46e5}

#bossBox{
margin-top:20px;
font-size:20px;
color:#f87171;
}

#leaderboard{
margin-top:30px;
padding:10px;
}

#board{
max-width:300px;
margin:auto;
text-align:left;
}

#achievements{
margin-top:30px;
}

.badge{
background:#1f2937;
padding:6px 10px;
border-radius:8px;
display:inline-block;
margin:5px;
font-size:14px;
}

#chat{
margin-top:30px;
padding:10px;
}

#messages{
height:120px;
overflow:auto;
background:#020617;
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

footer{
margin-top:30px;
font-size:12px;
color:#9ca3af;
padding:10px;
}

</style></head><body><header>🚀 Maths Nova</header><div id="stats"><div class="stat">Level <span id="level">1</span></div>
<div class="stat">XP <span id="xp">0</span></div>
<div class="stat">Coins <span id="coins">0</span></div>
<div class="stat">Streak <span id="streak">0</span></div></div><div id="game"><h2 id="question">Press Start</h2><input id="answer" placeholder="answer"><br><br>

<button onclick="submitAnswer()">Submit</button> <button onclick="newQuestion()">Start</button>

</div><div id="bossBox"></div><div id="leaderboard">
<h2>🌍 Global Leaderboard</h2>
<ol id="board"></ol>
</div><div id="achievements">
<h2>🏆 Achievements</h2>
<div id="badges"></div>
</div><div id="chat">
<h3>💬 Global Chat</h3>
<div id="messages"></div>
<input id="msg" placeholder="message">
<button onclick="sendMsg()">Send</button>
</div><footer>
Maths Nova Infinite Engine • AI Question Generator
</footer><script>

let level=1
let xp=0
let coins=0
let streak=0
let answer=0

const bosses=[
"Isaac Newton",
"Albert Einstein",
"Carl Gauss",
"Leonhard Euler",
"Ramanujan",
"Alan Turing",
"Stephen Hawking"
]

const achievements=[
{xp:50,name:"First Brain"},
{xp:200,name:"Math Warrior"},
{xp:500,name:"Equation Master"},
{xp:1000,name:"Number Legend"}
]

function randomInt(max){
return Math.floor(Math.random()*max)
}

function generateQuestion(){

let difficulty=Math.min(level,50)

let a=randomInt(10+difficulty*5)
let b=randomInt(10+difficulty*5)

let ops=["+","-","*","/"]
let op=ops[randomInt(ops.length)]

if(op=="/"){
a=a*b
}

if(op=="+")answer=a+b
if(op=="-")answer=a-b
if(op=="*")answer=a*b
if(op=="/")answer=a/b

document.getElementById("question").innerText=`${a} ${op} ${b} = ?`
}

function newQuestion(){
generateQuestion()
}

function submitAnswer(){

let user=Number(document.getElementById("answer").value)

if(user===answer){

streak++
xp+=10
coins+=5

if(streak%5===0){
coins+=10
}

if(xp>=level*60){
level++
xp=0
bossBattle()
}

}else{

streak=0
coins=Math.max(0,coins-3)

}

updateUI()

generateQuestion()

document.getElementById("answer").value=""
}

function bossBattle(){

if(level%10===0){

let boss=bosses[randomInt(bosses.length)]

let text="⚠ Boss Appeared: "+boss

document.getElementById("bossBox").innerText=text

setTimeout(()=>{

let bossQuestion=randomInt(100)+" * "+randomInt(10)
alert("BOSS CHALLENGE: Solve hard question!")

},500)

}

}

function updateLeaderboard(){

let board=document.getElementById("board")

board.innerHTML=""

let players=[
{name:"You",score:level},
{name:"NovaAI",score:50},
{name:"EulerBot",score:44},
{name:"Alpha",score:39},
{name:"Quantum",score:35}
]

players.sort((a,b)=>b.score-a.score)

players.forEach(p=>{

let li=document.createElement("li")

li.innerText=p.name+" - Level "+p.score

board.appendChild(li)

})

}

function updateAchievements(){

let box=document.getElementById("badges")
box.innerHTML=""

achievements.forEach(a=>{

if(level*60>=a.xp){

let b=document.createElement("div")
b.className="badge"
b.innerText=a.name

box.appendChild(b)

}

})

}

function updateUI(){

levelEl.innerText=level
xpEl.innerText=xp
coinsEl.innerText=coins
streakEl.innerText=streak

updateLeaderboard()
updateAchievements()

}

function sendMsg(){

let msg=document.getElementById("msg").value

if(!msg)return

let box=document.getElementById("messages")

box.innerHTML+="Player: "+msg+"<br>"

box.scrollTop=box.scrollHeight

msg.value=""

}

const levelEl=document.getElementById("level")
const xpEl=document.getElementById("xp")
const coinsEl=document.getElementById("coins")
const streakEl=document.getElementById("streak")

updateUI()

</script></body>
</html>

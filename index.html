}

</style></head><body><div class="container"><h2>🚀 DIFFERENT X</h2>
<p>Ethiopian Grade 8 Math Challenge</p><div id="start">
<input id="name" placeholder="Enter your name">
<button class="primary" onclick="startGame()">Start Game</button>
</div><div id="game" class="hidden">
<h3 id="question"></h3>
<input id="answer" placeholder="Your answer">
<br>
<button class="primary" onclick="checkAnswer()">Submit</button><div id="ad" class="hidden">
<p>📢 Watch Ad to See Solution</p>
<button class="warning" onclick="showSolution()">Show Formula</button>
</div><p id="result"></p>
<p id="formula"></p><div class="bar"><div id="xpbar" class="barfill"></div></div>
<p id="xptext">XP: 0 | Level: 1</p><div id="achievements"></div><button class="success" onclick="nextQuestion()">Next</button>

</div><div id="end" class="hidden">
<h3 id="final"></h3>
<div class="leaderboard" id="board"></div>
<button onclick="restart()">Play Again</button>
</div><!-- Google Ad block --><ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-XXXX"
data-ad-slot="1234567890"
data-ad-format="auto"
data-full-width-responsive="true"></ins>

</div><audio id="correctSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bfa3f.mp3?filename=correct-2-46134.mp3"></audio> <audio id="wrongSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3c9b0c1d36.mp3?filename=error-126627.mp3"></audio>

<script>

let questions=[
{q:"√64 = ?",a:"8",f:"8 × 8 = 64"},
{q:"√81 = ?",a:"9",f:"9 × 9 = 81"},
{q:"Area of triangle (b=4,h=6)",a:"12",f:"1/2 × base × height"},
{q:"Area of triangle (b=10,h=5)",a:"25",f:"1/2 × b × h"},
{q:"Right triangle 6,8 hypotenuse?",a:"10",f:"a² + b² = c²"},
{q:"√144 = ?",a:"12",f:"12 × 12 = 144"},
{q:"Triangle base 12 height 3 area?",a:"18",f:"1/2 × b × h"}
];

let current=0;
let xp=0;
let level=1;
let player="";
let achievements=[];

function startGame(){
player=document.getElementById("name").value;
if(player==""){alert("Enter name");return}

document.getElementById("start").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");

loadQuestion()
}

function loadQuestion(){
let q=questions[current];

document.getElementById("question").innerText=q.q;
document.getElementById("answer").value="";
document.getElementById("result").innerText="";
document.getElementById("formula").innerText="";
document.getElementById("ad").classList.add("hidden");
}

function checkAnswer(){
let user=document.getElementById("answer").value.trim();
let q=questions[current];

if(user===q.a){

correctSound.play();

document.getElementById("result").innerText="✅ Correct";

addXP(20);

checkAchievements();

}

else{

wrongSound.play();

document.getElementById("result").innerText="❌ Wrong";

document.getElementById("ad").classList.remove("hidden");

}
}

function showSolution(){
let q=questions[current];
document.getElementById("formula").innerText="Formula: "+q.f;
}

function nextQuestion(){

current++;

if(current>=questions.length){

endGame();
return

}

loadQuestion()

}

function addXP(amount){

xp+=amount;

if(xp>=100){
level++;
xp=0
}

let percent=(xp/100)*100;

document.getElementById("xpbar").style.width=percent+"%";

document.getElementById("xptext").innerText="XP: "+xp+" | Level: "+level;

}

function checkAchievements(){

if(level==2 && !achievements.includes("Beginner")){

achievements.push("Beginner");

showAchievement("🎉 Achievement: Math Beginner");

}

if(level==3 && !achievements.includes("Triangle")){

achievements.push("Triangle");

showAchievement("🏆 Achievement: Triangle Master");

}

}

function showAchievement(text){

let div=document.getElementById("achievements");

let badge=document.createElement("div");

badge.className="badge";

badge.innerText=text;


div.appendChild(badge);

}

function endGame(){


document.getElementById("game").classList.add("hidden");

document.getElementById("end").classList.remove("hidden");


document.getElementById("final").innerText="Great job "+player+"! Level "+level;

saveScore();

showLeaderboard();

}

function saveScore(){

let scores=JSON.parse(localStorage.getItem("dxScores")||"[]");

scores.push({name:player,level:level});

scores.sort((a,b)=>b.level-a.level);

localStorage.setItem("dxScores",JSON.stringify(scores));

}

function showLeaderboard(){

let scores=JSON.parse(localStorage.getItem("dxScores")||"[]");

let html="🏆 Leaderboard<br>";

scores.slice(0,10).forEach(s=>{

html+=s.name+" - Level "+s.level+"<br>";

});


document.getElementById("board").innerHTML=html;

}

function restart(){location.reload()}

</script></body>
</html>

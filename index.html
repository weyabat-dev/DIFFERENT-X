<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIFFERENT X – Global Math Game</title>
<style>
body{
  font-family:Arial, sans-serif;
  margin:0;
  background:radial-gradient(circle at top,#1a2a6c,#16222a,#000000);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}
.container{
  background:linear-gradient(145deg,#0f2027,#203a43,#2c5364);
  width:95%;
  max-width:720px;
  padding:28px;
  border-radius:20px;
  box-shadow:0 25px 70px rgba(0,0,0,0.7),0 0 25px rgba(0,200,255,0.4);
  text-align:center;
  border:1px solid rgba(255,255,255,0.08);
}h2{ margin:5px 0 15px 0; font-size:28px; letter-spacing:1px; background:linear-gradient(90deg,#00eaff,#7b5cff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

input,select{ width:100%; padding:12px; margin:8px 0; border-radius:10px; border:none; background:#0f1720; color:white; box-shadow:inset 0 0 8px rgba(0,255,255,0.3); }

button{ padding:12px 16px; border:none; border-radius:10px; cursor:pointer; margin:6px; font-weight:bold; transition:all .25s ease; }

button:hover{ transform:translateY(-2px) scale(1.03); box-shadow:0 0 15px rgba(0,255,255,0.6); }

.primary{ background:linear-gradient(90deg,#00c6ff,#0072ff); color:white; }

.success{ background:linear-gradient(90deg,#00ffb7,#00c853); color:black; }

.dark{ background:linear-gradient(90deg,#434343,#000000); color:white; }

.warning{ background:linear-gradient(90deg,#ffd200,#f7971e); }

.solution{ background:rgba(255,255,255,0.08); backdrop-filter:blur(8px); padding:12px; border-radius:10px; margin-top:12px; text-align:left; border:1px solid rgba(0,255,255,0.2); }

.ad{ background:rgba(255,230,120,0.15); padding:12px; border-radius:10px; margin-top:12px; border:1px solid rgba(255,200,0,0.4); }

.scoreboard{ display:flex; justify-content:space-between; font-weight:bold; margin-bottom:10px; font-size:16px; }

.hidden{display:none}

.leaderboard{ background:rgba(255,255,255,0.07); padding:12px; border-radius:10px; margin-top:14px; text-align:left; border:1px solid rgba(0,200,255,0.25); }

@keyframes glow{ 0%{box-shadow:0 0 5px #00eaff} 50%{box-shadow:0 0 25px #00eaff} 100%{box-shadow:0 0 5px #00eaff} }

.primary{ animation:glow 3s infinite; }

</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#203a43">
</head>
<body>
<div class="container"><h2>🌍 DIFFERENT X</h2>
<p id="subtitle">Global Math Learning Game</p><select id="language" onchange="setLanguage()">
<option value="en">English</option>
<option value="am">አማርኛ</option>
<option value="es">Español</option>
<option value="fr">Français</option>
</select><div id="startScreen">
<input id="studentName" placeholder="Enter your name">
<select id="grade">
<option>Grade 5</option>
<option>Grade 6</option>
<option>Grade 7</option>
<option selected>Grade 8</option>
<option>Grade 9</option>
</select><select id="topic">
<option value="sqrt">Square Roots</option>
<option value="algebra">Algebra</option>
<option value="angles">Triangle Angles</option>
<option value="area">Triangle Area</option>
<option value="percent">Percentages</option>
<option value="fractions">Fractions</option>
</select><button class="primary" onclick="startGame()" id="startBtn">Start</button>

</div><div id="quizScreen" class="hidden">
<div class="scoreboard">
<span id="score">Score: 0</span>
<span id="xp">XP: 0</span>
<span id="level">Level: 1</span>
</div><p id="question"></p>
<input id="answer" placeholder="Answer"><button class="primary" onclick="checkAnswer()" id="submitBtn">Submit</button> <button class="warning" onclick="showHint()" id="hintBtn">Hint</button>

<div id="hint" class="solution hidden"></div><div id="solution" class="solution hidden"></div><button class="dark" onclick="nextQuestion()" id="nextBtn">Next</button>

</div><div id="endScreen" class="hidden">
<h3 id="finalMessage"></h3>
<div id="achievements"></div>
<div class="leaderboard" id="leaderboard"></div>
<button class="primary" onclick="restart()">Play Again</button>
</div></div><button class="success" id="installBtn" style="display:none">📲 Install App</button>

<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e)=>{
 e.preventDefault();
 deferredPrompt=e;
 document.getElementById('installBtn').style.display='inline-block';
});

document.addEventListener('click',function(e){
 if(e.target && e.target.id==='installBtn'){
  if(deferredPrompt){
   deferredPrompt.prompt();
   deferredPrompt.userChoice.then(()=>{deferredPrompt=null});
  }
 }
});

if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js');
}


let score=0
let xp=0
let level=1
let student=""
let currentAnswer=0
let currentHint=""
let topic=""

let texts={
en:{start:"Start",submit:"Submit",hint:"Hint",next:"Next"},
am:{start:"ጀምር",submit:"መልስ አስገባ",hint:"ጠቃሚ ምክር",next:"ቀጣይ"},
es:{start:"Comenzar",submit:"Enviar",hint:"Pista",next:"Siguiente"},
fr:{start:"Commencer",submit:"Soumettre",hint:"Indice",next:"Suivant"}
}

function setLanguage(){
let lang=document.getElementById("language").value
let t=texts[lang]
document.getElementById("startBtn").innerText=t.start
document.getElementById("submitBtn").innerText=t.submit
document.getElementById("hintBtn").innerText=t.hint
document.getElementById("nextBtn").innerText=t.next
}

function startGame(){
student=document.getElementById("studentName").value
if(student==""){alert("Enter name");return}

topic=document.getElementById("topic").value

document.getElementById("startScreen").classList.add("hidden")
document.getElementById("quizScreen").classList.remove("hidden")

nextQuestion()
}

function generateQuestion(){

if(topic=="sqrt"){
let n=Math.floor(Math.random()*20)+2
currentAnswer=n
return {q:`√${n*n} = ?`,hint:`${n} × ${n}`}
}

if(topic=="algebra"){
let x=Math.floor(Math.random()*10)+1
let a=Math.floor(Math.random()*10)+1
currentAnswer=x
return {q:`${a*x} ÷ ${a} = x. x=?`,hint:`Divide ${a*x} by ${a}`}
}

if(topic=="angles"){
let a=Math.floor(Math.random()*80)+20
let b=Math.floor(Math.random()*80)+20
currentAnswer=180-a-b
return {q:`Triangle angles ${a}° and ${b}°. Third angle?`,hint:`Sum of triangle angles = 180`}
}

if(topic=="area"){
let b=Math.floor(Math.random()*10)+5
let h=Math.floor(Math.random()*10)+5
currentAnswer=(0.5*b*h)
return {q:`Triangle area b=${b} h=${h}`,hint:`½ × base × height`}
}

if(topic=="percent"){
let p=[10,20,25,50][Math.floor(Math.random()*4)]
let n=Math.floor(Math.random()*200)+50
currentAnswer=(p/100)*n
return {q:`${p}% of ${n}`,hint:`${p}/100 × ${n}`}
}

if(topic=="fractions"){
let a=Math.floor(Math.random()*9)+1
let b=Math.floor(Math.random()*9)+1
currentAnswer=(a+b)/b
return {q:`${a}/${b} + 1 = ?`,hint:`Convert 1 to ${b}/${b}`}
}
}

function nextQuestion(){
let q=generateQuestion()
document.getElementById("question").innerText=q.q
currentHint=q.hint

document.getElementById("answer").value=""
document.getElementById("solution").classList.add("hidden")
document.getElementById("hint").classList.add("hidden")
}

function checkAnswer(){
let user=parseFloat(document.getElementById("answer").value)

if(user==currentAnswer){
score+=10
xp+=5

if(xp>=level*50){
level++
alert("Level Up! 🎉")
}

playSound()
updateScore()
nextQuestion()
}
else{
document.getElementById("solution").innerText="Correct answer: "+currentAnswer
document.getElementById("solution").classList.remove("hidden")
}
}

function showHint(){
document.getElementById("hint").innerText=currentHint
document.getElementById("hint").classList.remove("hidden")
}

function updateScore(){
document.getElementById("score").innerText="Score: "+score
document.getElementById("xp").innerText="XP: "+xp
document.getElementById("level").innerText="Level: "+level
}

function playSound(){
let audio=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg")
audio.play()
}

function endGame(){
document.getElementById("quizScreen").classList.add("hidden")
document.getElementById("endScreen").classList.remove("hidden")
document.getElementById("finalMessage").innerText=`Great job ${student}! Score ${score}`

saveScore()
showLeaderboard()
showAchievements()
}

function saveScore(){
let scores=JSON.parse(localStorage.getItem("dxScores")||"[]")
scores.push({name:student,score:score})
localStorage.setItem("dxScores",JSON.stringify(scores))
}

function showLeaderboard(){
let scores=JSON.parse(localStorage.getItem("dxScores")||"[]")
scores.sort((a,b)=>b.score-a.score)
let html="<h4>🏆 Global Leaderboard</h4>"

scores.slice(0,5).forEach(s=>{
html+=`${s.name} – ${s.score}<br>`
})

document.getElementById("leaderboard").innerHTML=html
}

function showAchievements(){
let a=""

if(score>=50)a+='<span class="badge">⭐ Beginner</span>'
if(score>=100)a+='<span class="badge">🔥 Smart</span>'
if(score>=200)a+='<span class="badge">👑 Math Master</span>'

if(a=="")a="No achievements yet"

document.getElementById("achievements").innerHTML=a
}

function restart(){location.reload()}
</script></body>
  </html>

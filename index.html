<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Maths Nova</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0f;
color:white;
text-align:center;
}

#game{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

button{
padding:12px 20px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
background:#4cafef;
color:white;
}

#question{
font-size:28px;
margin:20px;
}

#map{
display:grid;
grid-template-columns:repeat(10,40px);
gap:3px;
margin-top:20px;
}

.tile{
width:40px;
height:40px;
background:#1c1c2e;
border-radius:5px;
}

.player{
background:#00ff9c;
}

.monster{
background:#ff3c3c;
}

</style>
</head>

<body>

<div id="game">

<h1>🚀 Maths Nova</h1>

<div>Level: <span id="level">1</span></div>
<div>Coins: <span id="coins">0</span></div>

<div id="question">Press Start</div>

<input id="answer" placeholder="Answer">
<br>

<button onclick="submitAnswer()">Submit</button>
<button onclick="generateQuestion()">Start</button>

<div id="map"></div>

</div>

<script>

let level=1
let coins=0
let correctAnswer=0

const map=document.getElementById("map")

function createMap(){

map.innerHTML=""

for(let i=0;i<100;i++){

let tile=document.createElement("div")
tile.className="tile"

if(i==45) tile.classList.add("player")
if(i==22) tile.classList.add("monster")

map.appendChild(tile)

}

}

createMap()

function generateQuestion(){

let a=Math.floor(Math.random()*20)
let b=Math.floor(Math.random()*20)

let type=Math.floor(Math.random()*3)

if(type==0){
correctAnswer=a+b
document.getElementById("question").innerText=a+" + "+b
}

if(type==1){
correctAnswer=a*b
document.getElementById("question").innerText=a+" × "+b
}

if(type==2){
correctAnswer=a-b
document.getElementById("question").innerText=a+" - "+b
}

}

function submitAnswer(){

let ans=document.getElementById("answer").value

if(ans==correctAnswer){

coins+=10
level++

document.getElementById("coins").innerText=coins
document.getElementById("level").innerText=level

alert("Correct! ⚔ Monster defeated!")

if(level%10==0){
alert("👑 BOSS FIGHT!")
}

generateQuestion()

}else{

alert("Wrong! Monster attacked!")

}

}

</script>

</body>
</html>

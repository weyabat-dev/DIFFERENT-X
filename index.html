const size=16
const map=[]

let player={x:8,y:8,level:1,coins:0,energy:100,armor:"None",ores:0,food:5,mechas:0}

let planet="Earth"
let currentAnswer=0

const foods=["Apple","Bread","Pizza","Burger","Steak","Energy Drink","Galaxy Fruit","Nano Soup","Space Ration","Golden Apple"]

function randomInt(max){return Math.floor(Math.random()*max)}

function generateMap(){
map.length=0
for(let y=0;y<size;y++){
for(let x=0;x<size;x++){
let type="grass"
let r=Math.random()
if(r<0.07)type="water"
else if(r<0.12)type="cave"
else if(r<0.15)type="temple"
else if(r<0.22)type="ore"
else if(r<0.28)type="monster"
else if(r<0.33)type="cow"
map.push({x,y,type})
}
}
}

function drawMap(){
const m=document.getElementById("map")
m.innerHTML=""
map.forEach(t=>{
let d=document.createElement("div")
d.className="tile "+t.type
if(player.x===t.x && player.y===t.y){
d.className="tile player"
d.innerText="P"
}
m.appendChild(d)
})
}

function move(dx,dy){
player.x=Math.max(0,Math.min(size-1,player.x+dx))
player.y=Math.max(0,Math.min(size-1,player.y+dy))
player.energy--
checkTile()
updateUI()
drawMap()
}

function checkTile(){
let tile=map.find(t=>t.x===player.x && t.y===player.y)

if(tile.type==="monster")spawnMonster()

if(tile.type==="ore"){
player.ores++
alert("You mined mathematical ore")
}

if(tile.type==="temple"){
alert("Ancient temple with a boss inside")
}

if(tile.type==="cave"){
alert("Dungeon cave discovered with monsters")
}

if(tile.type==="cow"){
player.food++
}
}

function spawnMonster(){
let a=randomInt(40)
let b=randomInt(40)
currentAnswer=a*b
question.innerText=`Monster asks: ${a} × ${b}`
}

function submitAnswer(){
let user=Number(answer.value)

if(user===currentAnswer){
let damage=1

if(player.mechas>0)damage=3

player.level+=damage
player.coins+=20

alert("Monster defeated")
}else{

if(player.armor!="None"){
player.energy-=5
}else{
player.energy-=20
}

alert("Wrong answer monster attacked")
}

answer.value=""
updateUI()
}

function eatFood(){

if(player.food<=0){
alert("No food")
return
}

let f=foods[randomInt(foods.length)]
player.food--
player.energy+=20
alert("You ate "+f)
updateUI()

}

function craftArmor(){

if(player.ores<5){
alert("Need 5 math ores")
return
}

player.ores-=5
player.armor="Math Armor"
alert("You crafted armor")
updateUI()

}

function buildBase(){

let tile=map.find(t=>t.x===player.x && t.y===player.y)

tile.type="base"
alert("Base built. You can expand it into a city.")

drawMap()

}

function buildMecha(){

if(player.ores<10){
alert("Need 10 ores to build a mecha")
return
}

player.ores-=10
player.mechas++

alert("Mecha built. Use it to defeat bosses.")

}

function useVehicle(v){

if(v==="Spacecraft"){
planet="New Planet " + randomInt(100)
alert("Traveling to another planet")
}

}

function updateUI(){
level.innerText=player.level
coins.innerText=player.coins
energy.innerText=player.energy
planet.innerText=planet
armor.innerText=player.armor
}

function sendMsg(){
let box=document.getElementById("messages")
let msg=document.getElementById("msg").value
if(!msg)return
box.innerHTML+="Player: "+msg+"<br>"
box.scrollTop=box.scrollHeight
msg.value=""
}

window.addEventListener("keydown",e=>{
if(e.key==="w")move(0,-1)
if(e.key==="s")move(0,1)
if(e.key==="a")move(-1,0)
if(e.key==="d")move(1,0)
})

generateMap()
drawMap()
updateUI()

function craft(item){

 if(!blueprints[item]){
  alert("No blueprint for " + item)
  return
 }

 const recipe = blueprints[item].materials
 let text = "Blueprint for " + item + "
"

 for(const m in recipe){
  text += m + " x" + recipe[m] + "
"
 }

 alert(text)

}
